<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Darija Translator</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>

  <div class="container">
    <h1>Darija Translator</h1>

    <label for="source-text">English</label>
    <textarea id="source-text" placeholder="Select text on any page and right-click → Translate to Darija"></textarea>

    <button id="translate-btn">Translate</button>

    <label for="result-text">Darija</label>
    <textarea id="result-text" readonly placeholder="Translation will appear here..."></textarea>

    <div id="status"></div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
